<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facilia, vizinhos do Update</title>
    <link rel="icon" type="image/png" href="imgs/logo_facilia.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream:        #F3EEE1;
            --cream-raised: #F8F3E6;
            --cream-deep:   #ECE5D3;
            --ink:          #111918;
            --ink-soft:     #2A3634;
            --ink-muted:    #6E7876;
            --ink-faint:    #A8AFAC;
            --teal:         #1A8B82;
            --teal-deep:    #0E4D48;
            --teal-light:   #5FD0BE;
            --teal-tint:    #D7EDE9;
            --line:         rgba(17, 25, 24, 0.10);
            --line-strong:  rgba(17, 25, 24, 0.20);
            --serif: "Fraunces", Georgia, serif;
            --sans:  "Geist", ui-sans-serif, system-ui, sans-serif;
            --mono:  "Geist Mono", ui-monospace, monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { width: 100%; min-height: 100%; }

        body {
            background: #1d1d1d;
            font-family: var(--sans);
            color: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            font-feature-settings: "ss01", "ss03", "cv11";
            letter-spacing: -0.005em;
        }

        /* Canvas 4:5 portrait */
        .flyer {
            position: relative;
            width: min(560px, 100%);
            aspect-ratio: 4 / 5;
            background: var(--cream);
            overflow: hidden;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.45);
            display: flex;
            flex-direction: column;
            padding: 7.5% 8% 6.5%;
        }

        /* fundo: grade fininha + scatter de pontos */
        .grid {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.28;
            background-image:
                linear-gradient(to right, var(--line) 1px, transparent 1px),
                linear-gradient(to bottom, var(--line) 1px, transparent 1px);
            background-size: 6.66% 5.33%;
            mask-image: radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0.85) 30%, transparent 90%);
            -webkit-mask-image: radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0.85) 30%, transparent 90%);
        }

        .scatter {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.50;
        }

        .halo {
            position: absolute;
            left: 50%;
            top: 60%;
            width: 95%;
            aspect-ratio: 1 / 1;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle,
                rgba(26,139,130,0.16) 0%,
                rgba(26,139,130,0.05) 40%,
                rgba(26,139,130,0) 70%);
            filter: blur(28px);
            z-index: 0;
            pointer-events: none;
        }

        /* corner ticks, identidade da marca */
        .corner {
            position: absolute;
            width: 14px;
            height: 14px;
            z-index: 4;
            pointer-events: none;
        }
        .corner::before, .corner::after {
            content: '';
            position: absolute;
            background: var(--ink);
            opacity: 0.55;
        }
        .corner::before { width: 14px; height: 1px; top: 0; left: 0; }
        .corner::after  { width: 1px; height: 14px; top: 0; left: 0; }
        .corner-tl { top: 18px; left: 18px; }
        .corner-tr { top: 18px; right: 18px; transform: scaleX(-1); }
        .corner-bl { bottom: 18px; left: 18px; transform: scaleY(-1); }
        .corner-br { bottom: 18px; right: 18px; transform: scale(-1, -1); }

        /* HEADER: Update à esquerda, Facilia à direita */
        .header {
            position: relative;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--line-strong);
        }

        .logo-update {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-update img {
            display: block;
            width: 88px;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 4px 10px -4px rgba(0,0,0,0.25),
                        0 0 0 1px rgba(0,0,0,0.05);
        }

        .header-meta {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--ink-muted);
            line-height: 1.4;
            text-align: center;
            flex: 1;
        }
        .header-meta .x {
            font-family: var(--serif);
            font-style: italic;
            font-size: 22px;
            color: var(--ink-soft);
            font-variation-settings: "SOFT" 80, "WONK" 1, "opsz" 144;
            display: block;
            margin-bottom: 2px;
        }

        .logo-facilia {
            display: flex;
            align-items: center;
        }
        .logo-facilia img {
            display: block;
            height: 88px;
            width: auto;
            filter: drop-shadow(0 4px 10px rgba(14, 77, 72, 0.15));
        }

        /* HERO */
        .hero {
            position: relative;
            z-index: 3;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 6% 0 4%;
        }

        .greeting {
            font-family: var(--serif);
            font-style: italic;
            font-weight: 400;
            font-size: clamp(36px, 8.2vw, 54px);
            line-height: 1.0;
            letter-spacing: -0.025em;
            color: var(--ink);
            font-variation-settings: "SOFT" 80, "WONK" 1, "opsz" 144;
            margin-bottom: 24px;
        }
        .greeting .accent {
            color: var(--teal-deep);
        }

        .body-text {
            font-family: var(--sans);
            font-size: clamp(15px, 3.2vw, 18px);
            line-height: 1.55;
            color: var(--ink-soft);
            font-weight: 400;
            max-width: 96%;
            letter-spacing: -0.005em;
        }
        .body-text strong {
            color: var(--ink);
            font-weight: 600;
        }
        .body-text .pill {
            color: var(--teal-deep);
            font-weight: 600;
        }

        .closing {
            margin-top: 22px;
            font-family: var(--serif);
            font-style: italic;
            font-weight: 400;
            font-size: clamp(22px, 4.6vw, 30px);
            line-height: 1.15;
            color: var(--teal-deep);
            letter-spacing: -0.015em;
            font-variation-settings: "SOFT" 80, "WONK" 1, "opsz" 144;
        }

        /* FOOTER */
        .footer {
            position: relative;
            z-index: 3;
            border-top: 1px solid var(--line-strong);
            padding-top: 18px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
        }

        .signature {
            text-align: right;
        }
        .signature .name {
            font-family: var(--serif);
            font-size: 22px;
            font-weight: 500;
            color: var(--ink);
            line-height: 1;
            letter-spacing: -0.01em;
            font-variation-settings: "SOFT" 50, "opsz" 80;
            margin-bottom: 4px;
        }
        .signature .role {
            font-family: var(--sans);
            font-size: 12px;
            color: var(--ink-muted);
            letter-spacing: 0.02em;
        }

        .footer-left {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.06em;
            color: var(--ink-muted);
            text-align: left;
            line-height: 1.6;
            text-transform: uppercase;
        }

        .grain {
            position: absolute;
            inset: 0;
            z-index: 5;
            pointer-events: none;
            opacity: 0.26;
            mix-blend-mode: multiply;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='4'/><feColorMatrix values='0 0 0 0 0.05  0 0 0 0 0.05  0 0 0 0 0.05  0 0 0 0.55 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
            background-size: 200px 200px;
        }

        .hint {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--mono);
            font-size: 11px;
            color: rgba(255,255,255,0.55);
            letter-spacing: 0.06em;
            text-align: center;
            pointer-events: none;
        }

        @media print {
            body { background: white; padding: 0; }
            .flyer { box-shadow: none; }
            .hint { display: none; }
        }
    </style>
</head>
<body>

    <article class="flyer" role="img" aria-label="Facilia, condição especial para vizinhos do Update">

        <div class="grid" aria-hidden="true"></div>
        <div class="halo" aria-hidden="true"></div>

        <svg class="scatter" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
            <g>
                <g fill="#0E4D48">
                    <circle cx="55"  cy="180" r="2"/>
                    <circle cx="345" cy="120" r="1.7"/>
                    <circle cx="40"  cy="360" r="2.3"/>
                    <circle cx="370" cy="380" r="2"/>
                    <circle cx="120" cy="445" r="2.3"/>
                    <circle cx="285" cy="455" r="2"/>
                </g>
                <g fill="#1A8B82">
                    <circle cx="92"  cy="98"  r="1.5"/>
                    <circle cx="300" cy="78"  r="1.5"/>
                    <circle cx="60"  cy="270" r="1.5"/>
                    <circle cx="375" cy="260" r="1.5"/>
                    <circle cx="200" cy="478" r="1.5"/>
                    <circle cx="32"  cy="410" r="1.5"/>
                </g>
                <g fill="#5FD0BE">
                    <circle cx="160" cy="62"  r="2.2"/>
                    <circle cx="245" cy="52"  r="2"/>
                    <circle cx="358" cy="195" r="1.8"/>
                    <circle cx="48"  cy="490" r="2"/>
                    <circle cx="350" cy="475" r="2.2"/>
                </g>
            </g>
        </svg>

        <header class="header">
            <div class="logo-update" aria-label="Condomínio Update">
                <img src="imgs/update_logo.png" alt="Update">
            </div>

            <div class="logo-facilia" aria-label="Facilia">
                <img src="imgs/logo_facilia.png" alt="Facilia">
            </div>
        </header>

        <section class="hero">
            <h1 class="greeting">
                Olá,<br>
                vizinho <span class="accent">empreendedor.</span>
            </h1>

            <p class="body-text">
                Tenho uma <strong>condição especial</strong> para você, morador do condomínio, em projetos de
                <span class="pill">dados</span>,
                <span class="pill">IA</span>
                e <span class="pill">automação</span>.
            </p>

            <p class="closing">Vamos crescer juntos.</p>
        </section>

        <footer class="footer">
            <div class="footer-left">
                detalhes na mensagem<br>
                do grupo
            </div>
            <div class="signature">
                <div class="name">Walter</div>
                <div class="role">Morador desde 2014</div>
            </div>
        </footer>

        <span class="corner corner-tl" aria-hidden="true"></span>
        <span class="corner corner-tr" aria-hidden="true"></span>
        <span class="corner corner-bl" aria-hidden="true"></span>
        <span class="corner corner-br" aria-hidden="true"></span>

        <div class="grain" aria-hidden="true"></div>
    </article>

    <div class="hint">tire um print desta arte para postar no grupo</div>

</body>
</html>
