<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facilia — logo card (dinâmico)</title>
    <link rel="icon" type="image/png" href="imgs/logo_facilia.png">
    <style>
        :root {
            --cream:        #F3EEE1;
            --cream-raised: #F8F3E6;
            --ink:          #111918;
            --teal:         #1A8B82;
            --teal-deep:    #0E4D48;
            --line:         rgba(17, 25, 24, 0.10);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { width: 100%; height: 100%; }

        body {
            background: var(--cream);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            min-height: 100vh;
        }

        /* ---------- GRAIN overlay ---------- */
        .grain {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            opacity: 0.35;
            mix-blend-mode: multiply;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='4'/><feColorMatrix values='0 0 0 0 0.05  0 0 0 0 0.05  0 0 0 0 0.05  0 0 0 0.55 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
            background-size: 200px 200px;
        }

        /* ---------- CARD (square) ---------- */
        .card {
            position: relative;
            width: min(92vmin, 1200px);
            aspect-ratio: 1 / 1;
            background: var(--cream);
            overflow: hidden;
        }

        .card-grid {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.35;
            background-image:
                linear-gradient(to right, var(--line) 1px, transparent 1px),
                linear-gradient(to bottom, var(--line) 1px, transparent 1px);
            background-size: 8% 8%;
            mask-image: radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0.8) 40%, transparent 85%);
            -webkit-mask-image: radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0.8) 40%, transparent 85%);
        }

        .stage {
            position: absolute;
            inset: 6%;
            z-index: 1;
        }

        .scatter {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* ---------- DOTS drift (constant opacity, organic motion) ---------- */
        .scatter .scatter-points circle {
            opacity: 0.55;
            transform-box: fill-box;
            transform-origin: center;
            will-change: transform;
        }

        .scatter .scatter-points circle:nth-of-type(6n+1) { animation: drift-a 7s   ease-in-out infinite; }
        .scatter .scatter-points circle:nth-of-type(6n+2) { animation: drift-b 9s   ease-in-out infinite; }
        .scatter .scatter-points circle:nth-of-type(6n+3) { animation: drift-c 8s   ease-in-out infinite; }
        .scatter .scatter-points circle:nth-of-type(6n+4) { animation: drift-d 10s  ease-in-out infinite; }
        .scatter .scatter-points circle:nth-of-type(6n+5) { animation: drift-e 7.5s ease-in-out infinite; }
        .scatter .scatter-points circle:nth-of-type(6n)   { animation: drift-f 9.5s ease-in-out infinite; }

        .scatter .scatter-points circle:nth-of-type(11n+1)  { animation-delay: -0.4s; }
        .scatter .scatter-points circle:nth-of-type(11n+2)  { animation-delay: -2.3s; }
        .scatter .scatter-points circle:nth-of-type(11n+3)  { animation-delay: -5.1s; }
        .scatter .scatter-points circle:nth-of-type(11n+4)  { animation-delay: -0.8s; }
        .scatter .scatter-points circle:nth-of-type(11n+5)  { animation-delay: -7.4s; }
        .scatter .scatter-points circle:nth-of-type(11n+6)  { animation-delay: -3.6s; }
        .scatter .scatter-points circle:nth-of-type(11n+7)  { animation-delay: -9.2s; }
        .scatter .scatter-points circle:nth-of-type(11n+8)  { animation-delay: -4.0s; }
        .scatter .scatter-points circle:nth-of-type(11n+9)  { animation-delay: -6.5s; }
        .scatter .scatter-points circle:nth-of-type(11n+10) { animation-delay: -1.9s; }
        .scatter .scatter-points circle:nth-of-type(11n)    { animation-delay: -8.3s; }

        /* amplitudes scaled to card's viewBox (400x400) — about 1/3 of the banner's */
        @keyframes drift-a {
            0%   { transform: translate(0, 0); }
            25%  { transform: translate(9px, -6px); }
            50%  { transform: translate(3px, -12px); }
            75%  { transform: translate(-7px, -5px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes drift-b {
            0%   { transform: translate(0, 0); }
            33%  { transform: translate(-8px, 5px); }
            66%  { transform: translate(6px, 9px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes drift-c {
            0%   { transform: translate(0, 0); }
            25%  { transform: translate(-5px, -7px); }
            50%  { transform: translate(-11px, 3px); }
            75%  { transform: translate(-3px, 8px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes drift-d {
            0%   { transform: translate(0, 0); }
            50%  { transform: translate(12px, 7px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes drift-e {
            0%   { transform: translate(0, 0); }
            20%  { transform: translate(5px, 8px); }
            60%  { transform: translate(-7px, 6px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes drift-f {
            0%   { transform: translate(0, 0); }
            40%  { transform: translate(-7px, -9px); }
            80%  { transform: translate(8px, -3px); }
            100% { transform: translate(0, 0); }
        }

        /* ---------- concentric rings rotate slowly ---------- */
        .rings { transform-origin: center; transform-box: fill-box; }
        .ring-a { animation: spin 60s linear infinite; }
        .ring-b { animation: spin 90s linear infinite reverse; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ---------- LOGO stage ---------- */
        .logo-stage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 68%;
            aspect-ratio: 1 / 1;
            z-index: 2;
            animation: logo-float 7s ease-in-out infinite;
        }

        @keyframes logo-float {
            0%, 100% { transform: translate(-50%, -50%); }
            50%      { transform: translate(-50%, calc(-50% - 6px)); }
        }

        .logo-halo {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 130%;
            aspect-ratio: 1 / 1;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle,
                rgba(26,139,130,0.22) 0%,
                rgba(26,139,130,0.10) 40%,
                rgba(26,139,130,0) 70%);
            filter: blur(24px);
            z-index: 0;
            animation: halo-breathe 6s ease-in-out infinite;
        }

        @keyframes halo-breathe {
            0%, 100% { opacity: 0.85; transform: translate(-50%, -50%) scale(1); }
            50%      { opacity: 1;    transform: translate(-50%, -50%) scale(1.08); }
        }

        .logo-disc {
            position: absolute;
            inset: 0;
            background: var(--cream-raised);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 1px 0 0 rgba(255,255,255,0.8) inset,
                0 0 0 1px var(--line),
                0 30px 60px -20px rgba(14, 77, 72, 0.25),
                0 12px 24px -10px rgba(14, 77, 72, 0.15);
            z-index: 1;
            opacity: 0;
            transform: scale(0.85);
            animation: disc-in 1s cubic-bezier(0.2, 0.8, 0.2, 1) 0.5s forwards;
        }

        @keyframes disc-in {
            to { opacity: 1; transform: scale(1); }
        }

        .logo-img {
            width: 72%;
            height: auto;
            filter: drop-shadow(0 6px 18px rgba(14, 77, 72, 0.18));
            display: block;
        }

        /* ---------- corner ticks ---------- */
        .corner {
            position: absolute;
            width: 14px;
            height: 14px;
            z-index: 3;
            pointer-events: none;
            opacity: 0;
            animation: corner-in 0.6s ease-out 1.1s forwards;
        }

        @keyframes corner-in {
            to { opacity: 1; }
        }

        .corner::before,
        .corner::after {
            content: '';
            position: absolute;
            background: var(--ink);
            opacity: 0.55;
        }

        .corner::before { width: 14px; height: 1px; top: 0; left: 0; }
        .corner::after  { width: 1px; height: 14px; top: 0; left: 0; }

        .corner-tl { top: 20px;    left: 20px; }
        .corner-tr { top: 20px;    right: 20px; transform: scaleX(-1); }
        .corner-bl { bottom: 20px; left: 20px;  transform: scaleY(-1); }
        .corner-br { bottom: 20px; right: 20px; transform: scale(-1, -1); }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
            .logo-disc, .corner { opacity: 1; }
            .logo-disc { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="card" role="img" aria-label="Facilia">
        <div class="card-grid" aria-hidden="true"></div>

        <div class="stage" aria-hidden="true">
            <svg class="scatter" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet">
                <!-- concentric decorative circles (rotating) -->
                <g class="rings">
                    <circle class="ring-a" cx="200" cy="200" r="150" fill="none" stroke="rgba(26,139,130,0.10)" stroke-width="0.8" stroke-dasharray="1 6"/>
                    <circle class="ring-b" cx="200" cy="200" r="100" fill="none" stroke="rgba(26,139,130,0.12)" stroke-width="0.8" stroke-dasharray="1 6"/>
                </g>

                <!-- scattered data points — 3 teal intensities -->
                <g class="scatter-points">
                    <!-- deep (#0E4D48) -->
                    <g fill="#0E4D48">
                        <circle cx="65"  cy="120" r="2"/>
                        <circle cx="175" cy="110" r="2"/>
                        <circle cx="340" cy="130" r="1.5"/>
                        <circle cx="48"  cy="220" r="2"/>
                        <circle cx="110" cy="315" r="2.5"/>
                        <circle cx="245" cy="345" r="2"/>
                        <circle cx="360" cy="255" r="2.5"/>
                        <circle cx="260" cy="260" r="2"/>
                    </g>
                    <!-- mid (#1A8B82) -->
                    <g fill="#1A8B82">
                        <circle cx="98"  cy="85"  r="1.5"/>
                        <circle cx="220" cy="75"  r="1.5"/>
                        <circle cx="300" cy="85"  r="2"/>
                        <circle cx="75"  cy="170" r="1.5"/>
                        <circle cx="32"  cy="260" r="1.5"/>
                        <circle cx="150" cy="340" r="2"/>
                        <circle cx="290" cy="325" r="1.5"/>
                        <circle cx="375" cy="215" r="1.5"/>
                        <circle cx="155" cy="150" r="1.5"/>
                    </g>
                    <!-- light (#5FD0BE) -->
                    <g fill="#5FD0BE">
                        <circle cx="140" cy="60"  r="2.5"/>
                        <circle cx="260" cy="50"  r="2.5"/>
                        <circle cx="355" cy="175" r="2"/>
                        <circle cx="115" cy="155" r="2.5"/>
                        <circle cx="70"  cy="285" r="2"/>
                        <circle cx="195" cy="355" r="2.5"/>
                        <circle cx="330" cy="295" r="2"/>
                        <circle cx="145" cy="260" r="2"/>
                        <circle cx="255" cy="155" r="1.5"/>
                    </g>
                </g>
            </svg>

            <div class="logo-stage">
                <div class="logo-halo"></div>
                <div class="logo-disc">
                    <img src="imgs/logo_facilia.png" alt="Facilia" class="logo-img">
                </div>
            </div>

            <span class="corner corner-tl"></span>
            <span class="corner corner-tr"></span>
            <span class="corner corner-bl"></span>
            <span class="corner corner-br"></span>
        </div>
    </div>

    <div class="grain" aria-hidden="true"></div>

</body>
</html>
