<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facilia — banner header</title>
    <link rel="icon" type="image/png" href="imgs/logo_facilia.png">
    <style>
        :root {
            --cream:        #F3EEE1;
            --cream-raised: #F8F3E6;
            --ink:          #111918;
            --teal:         #1A8B82;
            --teal-deep:    #0E4D48;
            --line:         rgba(17, 25, 24, 0.10);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { width: 100%; height: 100%; }

        body {
            background: var(--cream);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            min-height: 100vh;
        }

        /* ---------- GRAIN overlay ---------- */
        .grain {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            opacity: 0.35;
            mix-blend-mode: multiply;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='4'/><feColorMatrix values='0 0 0 0 0.05  0 0 0 0 0.05  0 0 0 0 0.05  0 0 0 0.55 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
            background-size: 200px 200px;
        }

        /* ---------- BANNER (wide 4:1) ---------- */
        .banner {
            position: relative;
            width: min(96vw, 1600px);
            aspect-ratio: 4 / 1;
            background: var(--cream);
            overflow: hidden;
        }

        .banner-grid {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.30;
            background-image:
                linear-gradient(to right, var(--line) 1px, transparent 1px),
                linear-gradient(to bottom, var(--line) 1px, transparent 1px);
            background-size: 3% 12%;
            mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,0.7) 25%, rgba(0,0,0,0.7) 75%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,0.7) 25%, rgba(0,0,0,0.7) 75%, transparent 100%);
        }

        .stage {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        .scatter {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* dots drift gently — constant opacity, small organic translation */
        .scatter .scatter-points circle {
            opacity: 0.55;
            transform-box: fill-box;
            transform-origin: center;
            will-change: transform;
        }

        /* 6 drift variants, assigned round-robin via nth-of-type (works inside each <g>) */
        .scatter .scatter-points circle:nth-of-type(6n+1) { animation: drift-a 7s   ease-in-out infinite; }
        .scatter .scatter-points circle:nth-of-type(6n+2) { animation: drift-b 9s   ease-in-out infinite; }
        .scatter .scatter-points circle:nth-of-type(6n+3) { animation: drift-c 8s   ease-in-out infinite; }
        .scatter .scatter-points circle:nth-of-type(6n+4) { animation: drift-d 10s  ease-in-out infinite; }
        .scatter .scatter-points circle:nth-of-type(6n+5) { animation: drift-e 7.5s ease-in-out infinite; }
        .scatter .scatter-points circle:nth-of-type(6n)   { animation: drift-f 9.5s ease-in-out infinite; }

        /* staggered starts so the motion doesn't sync up */
        .scatter .scatter-points circle:nth-of-type(11n+1)  { animation-delay: -0.4s; }
        .scatter .scatter-points circle:nth-of-type(11n+2)  { animation-delay: -2.3s; }
        .scatter .scatter-points circle:nth-of-type(11n+3)  { animation-delay: -5.1s; }
        .scatter .scatter-points circle:nth-of-type(11n+4)  { animation-delay: -0.8s; }
        .scatter .scatter-points circle:nth-of-type(11n+5)  { animation-delay: -7.4s; }
        .scatter .scatter-points circle:nth-of-type(11n+6)  { animation-delay: -3.6s; }
        .scatter .scatter-points circle:nth-of-type(11n+7)  { animation-delay: -9.2s; }
        .scatter .scatter-points circle:nth-of-type(11n+8)  { animation-delay: -4.0s; }
        .scatter .scatter-points circle:nth-of-type(11n+9)  { animation-delay: -6.5s; }
        .scatter .scatter-points circle:nth-of-type(11n+10) { animation-delay: -1.9s; }
        .scatter .scatter-points circle:nth-of-type(11n)    { animation-delay: -8.3s; }

        @keyframes drift-a {
            0%   { transform: translate(0, 0); }
            25%  { transform: translate(28px, -18px); }
            50%  { transform: translate(10px, -36px); }
            75%  { transform: translate(-20px, -14px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes drift-b {
            0%   { transform: translate(0, 0); }
            33%  { transform: translate(-24px, 16px); }
            66%  { transform: translate(18px, 28px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes drift-c {
            0%   { transform: translate(0, 0); }
            25%  { transform: translate(-14px, -22px); }
            50%  { transform: translate(-32px, 10px); }
            75%  { transform: translate(-10px, 24px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes drift-d {
            0%   { transform: translate(0, 0); }
            50%  { transform: translate(36px, 20px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes drift-e {
            0%   { transform: translate(0, 0); }
            20%  { transform: translate(16px, 24px); }
            60%  { transform: translate(-22px, 18px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes drift-f {
            0%   { transform: translate(0, 0); }
            40%  { transform: translate(-20px, -28px); }
            80%  { transform: translate(24px, -10px); }
            100% { transform: translate(0, 0); }
        }

        /* single dashed trend line, subtle — draws in once, stays */
        .trend-line {
            stroke-dasharray: 14 10;
            stroke-dashoffset: 1500;
            animation: reveal-trend 2.6s ease-out 0.3s forwards;
        }

        @keyframes reveal-trend {
            to { stroke-dashoffset: 0; }
        }

        /* concentric rings rotate slowly, offsetting so it feels alive */
        .rings { transform-origin: center; transform-box: fill-box; }
        .ring-a { animation: spin 60s linear infinite; }
        .ring-b { animation: spin 90s linear infinite reverse; }
        .ring-c { animation: spin 45s linear infinite; }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ---------- LOGO stage (right, vertically centered) ---------- */
        .logo-stage {
            position: absolute;
            right: 5%;
            top: 50%;
            height: 64%;
            aspect-ratio: 1 / 1;
            z-index: 2;
            animation: logo-float 6s ease-in-out infinite;
        }

        @keyframes logo-float {
            0%, 100% { transform: translateY(-50%); }
            50%      { transform: translateY(calc(-50% - 6px)); }
        }

        .logo-halo {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 135%;
            aspect-ratio: 1 / 1;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle,
                rgba(26,139,130,0.26) 0%,
                rgba(26,139,130,0.10) 45%,
                rgba(26,139,130,0) 70%);
            filter: blur(18px);
            z-index: 0;
            animation: halo-breathe 5s ease-in-out infinite;
        }

        @keyframes halo-breathe {
            0%, 100% { opacity: 0.85; transform: translate(-50%, -50%) scale(1); }
            50%      { opacity: 1;    transform: translate(-50%, -50%) scale(1.08); }
        }

        .logo-disc {
            position: absolute;
            inset: 0;
            background: var(--cream-raised);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 1px 0 0 rgba(255,255,255,0.8) inset,
                0 0 0 1px var(--line),
                0 18px 36px -14px rgba(14, 77, 72, 0.25),
                0 8px 16px -6px rgba(14, 77, 72, 0.15);
            z-index: 1;
            opacity: 0;
            transform: scale(0.85);
            animation: disc-in 1s cubic-bezier(0.2, 0.8, 0.2, 1) 0.6s forwards;
        }

        @keyframes disc-in {
            to { opacity: 1; transform: scale(1); }
        }

        .logo-img {
            width: 72%;
            height: auto;
            filter: drop-shadow(0 4px 14px rgba(14, 77, 72, 0.18));
            display: block;
        }

        /* ---------- corner ticks ---------- */
        .corner {
            position: absolute;
            width: 14px;
            height: 14px;
            z-index: 3;
            pointer-events: none;
            opacity: 0;
            animation: corner-in 0.6s ease-out 1.2s forwards;
        }

        @keyframes corner-in {
            to { opacity: 1; }
        }

        .corner::before,
        .corner::after {
            content: '';
            position: absolute;
            background: var(--ink);
            opacity: 0.55;
        }
        .corner::before { width: 14px; height: 1px; top: 0; left: 0; }
        .corner::after  { width: 1px; height: 14px; top: 0; left: 0; }

        .corner-tl { top: 18px;    left: 18px; }
        .corner-tr { top: 18px;    right: 18px; transform: scaleX(-1); }
        .corner-bl { bottom: 18px; left: 18px;  transform: scaleY(-1); }
        .corner-br { bottom: 18px; right: 18px; transform: scale(-1, -1); }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
            .logo-disc, .corner { opacity: 1; }
            .logo-disc { transform: scale(1); }
        }
    </style>
</head>
<body>
